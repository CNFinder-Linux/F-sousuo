<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>搜索以开始互联网之旅</title>

    <!-- ===== 网站图标 (Favicon) - 🍵 ===== -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%B5%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%B5%3C/text%3E%3C/svg%3E">

    <style>
        /* ----- 全局重置 & 壁纸背景 ----- */
        /* 我说我没用AI你信吗？*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0b1a2f;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease;
            background-color: #152b3e;
            cursor: default;
            flex-direction: column;
        }

        /* ----- 卡片：完全透明，无遮罩 ----- */
        .glass-card {
            width: 100%;
            max-width: 780px;
            padding: 2rem 1.8rem 2rem;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 0;
            border: none;
            box-shadow: none;
            color: #f0f7ff;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            flex: 1;
        }

        /* ----- 语言选择菜单 (覆盖层) ----- */
        .language-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }

        .language-overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .language-menu {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 2.4rem 2.8rem 2.8rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            max-width: 460px;
            width: 100%;
            text-align: center;
        }

        .language-menu h2 {
            font-size: 1.6rem;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .language-menu .sub {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .language-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .language-options .lang-btn {
            padding: 12px 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        .language-options .lang-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.12);
            transform: scale(1.01);
        }

        .language-options .lang-btn:active {
            transform: scale(0.97);
        }

        /* ----- 标题区域：动态问候语（合并后） ----- */
        .greeting-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            width: 100%;
        }

        .greeting-header .greeting-icon {
            font-size: 2.8rem;
            filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
            line-height: 1;
        }

        .greeting-header .greeting-title {
            font-weight: 600;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #b8d4f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 30px rgba(0,40,80,0.3);
            letter-spacing: 1px;
        }

        /* ----- 融合搜索框 (玻璃质感) ----- */
        .search-fusion {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 80px;
            padding: 6px 6px 6px 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                inset 0 2px 6px rgba(0,0,0,0.2),
                0 12px 32px -8px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .search-fusion:focus-within {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 
                inset 0 2px 8px rgba(0,0,0,0.15),
                0 18px 40px -10px rgba(0, 30, 60, 0.6);
        }

        .search-input-fusion {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 10px 14px 8px;
            font-size: 1.1rem;
            color: #f0f8ff;
            outline: none;
            min-width: 120px;
            letter-spacing: 0.3px;
        }

        .search-input-fusion::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
        }

        .search-btn-fusion {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 12px 26px;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .search-btn-fusion:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .search-btn-fusion:active {
            transform: scale(0.96);
        }

        /* ============================================================
           引擎切换选项 (PC端一行，移动端一列)
           ============================================================ */
        .engine-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 720px;
        }

        .engine-selector .engine-option {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            user-select: none;
            letter-spacing: 0.2px;
            flex: 0 1 auto;
        }

        .engine-selector .engine-option:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .engine-selector .engine-option.active {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.03);
        }

        /* ----- 底部版权信息（放最下方，带 - 符号） ----- */
        .footer-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 16px 0 8px 0;
            margin-top: auto;
        }

        .footer-studio {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.15);
            text-align: center;
            font-weight: 300;
            padding: 0 12px;
        }

        /* ============================================================
           移动端适配：搜索框置顶 + 引擎选项一列
           ============================================================ */
        .is-mobile body {
            align-items: flex-start;
            padding: 12px 10px;
        }

        .is-mobile .glass-card {
            padding: 0.6rem 0.2rem 1.2rem;
            min-height: auto;
            justify-content: flex-start;
            width: 100%;
            flex: 1;
        }

        .is-mobile .greeting-header {
            margin-bottom: 12px;
            gap: 8px;
        }
        .is-mobile .greeting-header .greeting-icon {
            font-size: 1.8rem;
        }
        .is-mobile .greeting-header .greeting-title {
            font-size: 1.6rem;
        }

        .is-mobile .search-fusion {
            order: -1;
            margin-bottom: 12px;
            padding: 4px 4px 4px 16px;
            max-width: 100%;
            border-radius: 60px;
        }
        .is-mobile .search-input-fusion {
            font-size: 0.95rem;
            padding: 10px 6px;
            min-width: 80px;
        }
        .is-mobile .search-btn-fusion {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .is-mobile .engine-selector {
            flex-direction: column;
            gap: 4px;
            max-width: 100%;
            width: 100%;
        }

        .is-mobile .engine-selector .engine-option {
            width: 100%;
            justify-content: center;
            padding: 8px 12px;
            font-size: 0.85rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .is-mobile .footer-wrapper {
            padding: 12px 0 6px 0;
        }

        .is-mobile .footer-studio {
            font-size: 0.55rem;
        }

        .is-mobile-small .glass-card {
            padding: 0.4rem 0.1rem 1rem;
        }
        .is-mobile-small .greeting-header .greeting-icon {
            font-size: 1.4rem;
        }
        .is-mobile-small .greeting-header .greeting-title {
            font-size: 1.2rem;
        }
        .is-mobile-small .search-input-fusion {
            font-size: 0.85rem;
            padding: 8px 4px;
        }
        .is-mobile-small .search-btn-fusion {
            padding: 6px 12px;
            font-size: 0.75rem;
        }
        .is-mobile-small .search-fusion {
            padding: 4px 4px 4px 12px;
            border-radius: 50px;
        }
        .is-mobile-small .engine-selector .engine-option {
            padding: 6px 10px;
            font-size: 0.75rem;
        }

        /* 语言菜单移动端适配 */
        @media (max-width: 480px) {
            .language-menu {
                padding: 1.8rem 1.2rem 2rem;
                border-radius: 24px;
            }
            .language-menu h2 {
                font-size: 1.3rem;
            }
            .language-options .lang-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 语言选择菜单（默认隐藏） ===== -->
    <div class="language-overlay hidden" id="languageOverlay">
        <div class="language-menu">
            <h2 id="menuTitle">🌐 Choose Language</h2>
            <p class="sub" id="menuSub">Select your preferred language</p>
            <div class="language-options" id="languageOptions">
                <!-- 由 JavaScript 动态生成 -->
            </div>
        </div>
    </div>

    <div class="glass-card" id="app">
        <!-- 标题区域：动态问候语（合并后） -->
        <div class="greeting-header" id="greetingHeader">
            <span class="greeting-icon" id="greetingHeaderIcon">🌅</span>
            <span class="greeting-title" id="greetingHeaderTitle">Good morning!</span>
        </div>

        <!-- 融合搜索框 -->
        <div class="search-fusion" id="searchFusion">
            <input type="text" class="search-input-fusion" id="searchInput" placeholder="Enter keywords…" autofocus>
            <button class="search-btn-fusion" id="searchBtn">
                <span>🔍</span> Search
            </button>
        </div>

        <!-- ===== 引擎切换选项 ===== -->
        <div class="engine-selector" id="engineSelector">
            <span class="engine-option active" data-engine="bing">Bing</span>
            <span class="engine-option" data-engine="baidu">Baidu</span>
            <span class="engine-option" data-engine="sogou">Sogou</span>
            <span class="engine-option" data-engine="google">Google</span>
            <span class="engine-option" data-engine="yahoo">Yahoo</span>
            <span class="engine-option" data-engine="360">360</span>
            <span class="engine-option" data-engine="bilibili">Bilibili</span>
            <span class="engine-option" data-engine="duckduckgo">DuckDuckGo</span>
        </div>
    </div>

    <!-- ===== 底部版权信息 ===== -->
    <div class="footer-wrapper">
        <div class="footer-studio" id="footerStudio">- Finder studio 工作室制作 - V2.0</div>
    </div>

    <script>
        (function() {
            "use strict";

            // ============================================================
            // 多语言配置（问候语固定为英文，不在此配置中）
            // ============================================================
            var SUPPORTED_LOCALES = ['zh-CN', 'zh-TW', 'en', 'ja', 'ko'];

            var LOCALE_DATA = {
                'zh-CN': {
                    label: '简体中文',
                    placeholder: '输入关键词…',
                    searchBtn: '搜索',
                    engineLabels: {
                        bing: '必应/Bing',
                        baidu: '百度',
                        sogou: '搜狗',
                        google: 'Google',
                        yahoo: '雅虎',
                        '360': '360',
                        bilibili: 'Bilibili',
                        duckduckgo: 'DuckDuckGo'
                    },
                    footer: '- Finder studio 工作室制作 -',
                    menuTitle: '🌐 选择语言',
                    menuSub: '请选择您偏好的语言'
                },
                'zh-TW': {
                    label: '繁體中文',
                    placeholder: '輸入關鍵詞…',
                    searchBtn: '搜尋',
                    engineLabels: {
                        bing: '必應/Bing',
                        baidu: '百度',
                        sogou: '搜狗',
                        google: 'Google',
                        yahoo: '雅虎',
                        '360': '360',
                        bilibili: 'Bilibili',
                        duckduckgo: 'DuckDuckGo'
                    },
                    footer: '- Finder studio 工作室製作 -',
                    menuTitle: '🌐 選擇語言',
                    menuSub: '請選擇您偏好的語言'
                },
                'en': {
                    label: 'English',
                    placeholder: 'Enter keywords…',
                    searchBtn: 'Search',
                    engineLabels: {
                        bing: 'Bing',
                        baidu: 'Baidu',
                        sogou: 'Sogou',
                        google: 'Google',
                        yahoo: 'Yahoo',
                        '360': '360',
                        bilibili: 'Bilibili',
                        duckduckgo: 'DuckDuckGo'
                    },
                    footer: '- Finder studio -',
                    menuTitle: '🌐 Choose Language',
                    menuSub: 'Select your preferred language'
                },
                'ja': {
                    label: '日本語',
                    placeholder: 'キーワードを入力…',
                    searchBtn: '検索',
                    engineLabels: {
                        bing: 'Bing',
                        baidu: '百度',
                        sogou: '搜狗',
                        google: 'Google',
                        yahoo: 'Yahoo',
                        '360': '360',
                        bilibili: 'Bilibili',
                        duckduckgo: 'DuckDuckGo'
                    },
                    footer: '- Finder studio スタジオ制作 -',
                    menuTitle: '🌐 言語を選択',
                    menuSub: 'お好みの言語を選択してください'
                },
                'ko': {
                    label: '한국어',
                    placeholder: '키워드를 입력하세요…',
                    searchBtn: '검색',
                    engineLabels: {
                        bing: 'Bing',
                        baidu: '바이두',
                        sogou: '소우거우',
                        google: 'Google',
                        yahoo: 'Yahoo',
                        '360': '360',
                        bilibili: 'Bilibili',
                        duckduckgo: 'DuckDuckGo'
                    },
                    footer: '- Finder studio 스튜디오 제작 -',
                    menuTitle: '🌐 언어 선택',
                    menuSub: '선호하는 언어를 선택하세요'
                }
            };

            var DEFAULT_LOCALE = 'en';

            // ============================================================
            // DOM 引用
            // ============================================================
            var overlay = document.getElementById('languageOverlay');
            var menuTitle = document.getElementById('menuTitle');
            var menuSub = document.getElementById('menuSub');
            var langOptionsContainer = document.getElementById('languageOptions');
            var searchInput = document.getElementById('searchInput');
            var searchBtn = document.getElementById('searchBtn');
            var engineOptions = document.querySelectorAll('.engine-option');
            var footerEl = document.getElementById('footerStudio');
            var greetingIcon = document.getElementById('greetingHeaderIcon');
            var greetingTitle = document.getElementById('greetingHeaderTitle');

            var currentEngineKey = 'bing';

            // ============================================================
            // 检测浏览器语言
            // ============================================================
            function detectLocale() {
                var lang = navigator.language || navigator.userLanguage || 'en';
                if (lang.startsWith('zh')) {
                    if (lang === 'zh-TW' || lang === 'zh-HK' || lang === 'zh-MO') return 'zh-TW';
                    return 'zh-CN';
                }
                if (lang.startsWith('ja')) return 'ja';
                if (lang.startsWith('ko')) return 'ko';
                return 'en';
            }

            function isSupported(locale) {
                return SUPPORTED_LOCALES.indexOf(locale) !== -1;
            }

            // ============================================================
            // 获取本地化数据
            // ============================================================
            function getLocaleData(locale) {
                return LOCALE_DATA[locale] || LOCALE_DATA[DEFAULT_LOCALE];
            }

            // ============================================================
            // 获取时间问候语
            // ============================================================
            function getGreeting() {
                var hour = new Date().getHours();
                if (hour >= 5 && hour < 12) return { emoji: '🌅', text: 'Good morning!' };
                if (hour >= 12 && hour < 14) return { emoji: '☀️', text: 'Good noon!' };
                if (hour >= 14 && hour < 18) return { emoji: '🌤️', text: 'Good afternoon!' };
                return { emoji: '🌙', text: 'Good evening!' };
            }

            function updateGreeting() {
                var g = getGreeting();
                if (greetingIcon) greetingIcon.textContent = g.emoji;
                if (greetingTitle) greetingTitle.textContent = g.text;
            }

            // ============================================================
            // 应用语言到页面（问候语保持不变，只改其他内容）
            // ============================================================
            function applyLocale(locale) {
                var data = getLocaleData(locale);

                if (searchInput) searchInput.placeholder = data.placeholder;
                if (searchBtn) {
                    searchBtn.innerHTML = '<span>🔍</span> ' + data.searchBtn;
                }
                engineOptions.forEach(function(opt) {
                    var key = opt.dataset.engine;
                    if (key && data.engineLabels[key]) {
                        opt.textContent = data.engineLabels[key];
                    }
                });
                if (footerEl) footerEl.textContent = data.footer;
            }

            // ============================================================
            // 生成语言选择菜单
            // ============================================================
            function buildLanguageMenu(selectedLocale) {
                langOptionsContainer.innerHTML = '';
                SUPPORTED_LOCALES.forEach(function(locale) {
                    var data = getLocaleData(locale);
                    var btn = document.createElement('button');
                    btn.className = 'lang-btn';
                    btn.textContent = data.label;
                    btn.dataset.locale = locale;
                    btn.addEventListener('click', function() {
                        var chosen = this.dataset.locale;
                        overlay.classList.add('hidden');
                        applyLocale(chosen);
                        try {
                            localStorage.setItem('preferredLocale', chosen);
                        } catch (e) {}
                    });
                    langOptionsContainer.appendChild(btn);
                });

                var defaultData = getLocaleData(selectedLocale || DEFAULT_LOCALE);
                menuTitle.textContent = defaultData.menuTitle || '🌐 Choose Language';
                menuSub.textContent = defaultData.menuSub || 'Select your preferred language';
            }

            // ============================================================
            // 显示语言选择菜单（如果浏览器语言不支持）
            // ============================================================
            function showLanguageMenuIfNeeded() {
                var savedLocale = null;
                try {
                    savedLocale = localStorage.getItem('preferredLocale');
                } catch (e) {}

                if (savedLocale && isSupported(savedLocale)) {
                    applyLocale(savedLocale);
                    overlay.classList.add('hidden');
                    return;
                }

                var detected = detectLocale();

                if (isSupported(detected)) {
                    applyLocale(detected);
                    overlay.classList.add('hidden');
                } else {
                    buildLanguageMenu(DEFAULT_LOCALE);
                    overlay.classList.remove('hidden');
                }
            }

            // ============================================================
            // 根据 UA 判断设备
            // ============================================================
            function isMobileDevice() {
                var ua = navigator.userAgent || '';
                var keywords = ['Android', 'iPhone', 'iPad', 'iPod', 'BlackBerry', 'Windows Phone', 'Opera Mini', 'IEMobile', 'Mobile', 'webOS', 'Symbian'];
                for (var i = 0; i < keywords.length; i++) {
                    if (ua.indexOf(keywords[i]) !== -1) return true;
                }
                return false;
            }

            function isSmallScreen() {
                return window.innerWidth < 430;
            }

            function applyDeviceClass() {
                var body = document.body;
                body.classList.remove('is-mobile', 'is-mobile-small');
                if (isMobileDevice()) {
                    body.classList.add('is-mobile');
                    if (isSmallScreen()) {
                        body.classList.add('is-mobile-small');
                    }
                }
            }

            // ============================================================
            // 搜索引擎配置
            // ============================================================
            var ENGINES = {
                bing: { url: 'https://www.bing.com/search?q=' },
                baidu: { url: 'https://www.baidu.com/s?wd=' },
                sogou: { url: 'https://www.sogou.com/web?query=' },
                google: { url: 'https://www.google.com/search?q=' },
                yahoo: { url: 'https://search.yahoo.com/search?p=' },
                '360': { url: 'https://www.so.com/s?q=' },
                bilibili: { url: 'https://search.bilibili.com/all?keyword=' },
                duckduckgo: { url: 'https://duckduckgo.com/?q=' }
            };

            engineOptions.forEach(function(opt) {
                opt.addEventListener('click', function() {
                    var key = this.dataset.engine;
                    if (key && ENGINES[key]) {
                        setActiveEngine(key, true);
                    }
                });
            });

            function setActiveEngine(engineKey, fromUser) {
                if (!ENGINES[engineKey]) return;
                engineOptions.forEach(function(opt) {
                    if (opt.dataset.engine === engineKey) {
                        opt.classList.add('active');
                    } else {
                        opt.classList.remove('active');
                    }
                });
                currentEngineKey = engineKey;
                if (fromUser) {
                    searchInput.focus();
                }
            }

            function performSearch() {
                var query = searchInput.value.trim();
                if (!query) {
                    searchInput.style.transition = 'border 0.1s';
                    searchInput.style.border = '1px solid rgba(255,180,180,0.4)';
                    setTimeout(function() {
                        searchInput.style.border = 'none';
                    }, 300);
                    return;
                }
                var engine = ENGINES[currentEngineKey];
                if (!engine) return;
                window.open(engine.url + encodeURIComponent(query), '_blank');
            }

            function setBingWallpaper() {
                var sources = [
                    'https://bing.biturl.top/?resolution=1920&format=image&index=0&mkt=zh-CN',
                    'https://bing.img.run/1920x1080.php',
                    'https://api.dujin.org/bing/1920.php'
                ];

                function tryLoad(index) {
                    if (index >= sources.length) {
                        document.body.style.backgroundImage = 'linear-gradient(145deg, #0f1f2f, #1a3450)';
                        return;
                    }
                    var url = sources[index];
                    var img = new Image();
                    img.crossOrigin = 'anonymous';
                    var timeoutId = setTimeout(function() {
                        img.src = '';
                        tryLoad(index + 1);
                    }, 8000);
                    img.onload = function() {
                        clearTimeout(timeoutId);
                        document.body.style.backgroundImage = 'url(' + url + ')';
                        document.body.style.backgroundSize = 'cover';
                        document.body.style.backgroundPosition = 'center';
                    };
                    img.onerror = function() {
                        tryLoad(index + 1);
                    };
                    img.src = url;
                }
                tryLoad(0);
            }

            function initEvents() {
                searchBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    performSearch();
                });

                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        performSearch();
                    }
                });

                window.addEventListener('resize', function() {
                    var body = document.body;
                    if (isMobileDevice()) {
                        if (window.innerWidth < 430) {
                            body.classList.add('is-mobile-small');
                        } else {
                            body.classList.remove('is-mobile-small');
                        }
                    }
                });
            }

            function initDefault() {
                engineOptions.forEach(function(opt) {
                    if (opt.dataset.engine === 'bing') {
                        opt.classList.add('active');
                    } else {
                        opt.classList.remove('active');
                    }
                });
                currentEngineKey = 'bing';
            }

            function init() {
                applyDeviceClass();
                setBingWallpaper();
                initEvents();
                initDefault();
                updateGreeting();
                showLanguageMenuIfNeeded();
                setTimeout(function() {
                    searchInput.focus();
                }, 300);
            }

            if (document.readyState === 'complete') {
                init();
            } else {
                window.addEventListener('load', init);
            }

            window.__switchEngine = setActiveEngine;
        })();
    </script>

</body>
