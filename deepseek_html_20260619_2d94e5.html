<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>动态问候 · 导航</title>
    <style>
        /* ----- 全局重置 & 壁纸背景 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0b1a2f;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease;
            background-color: #152b3e;
            cursor: default;
        }

        /* ----- 液态玻璃卡片 (核心) ----- */
        .glass-card {
            width: 100%;
            max-width: 780px;
            padding: 2.6rem 2.2rem 2.4rem;
            background: rgba(20, 40, 60, 0.25);
            backdrop-filter: blur(16px) saturate(200%);
            -webkit-backdrop-filter: blur(16px) saturate(200%);
            border-radius: 64px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 30px 60px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
            color: #f0f7ff;
            text-align: center;
            position: relative;
            overflow: hidden;
            pointer-events: auto;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card > * {
            position: relative;
            z-index: 1;
        }

        /* ----- 标题区域：显示动态问候语 (原“液态导航”替换) ----- */
        .greeting-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            min-height: 70px;
        }

        .greeting-header .greeting-icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
            line-height: 1;
        }

        .greeting-header .greeting-title {
            font-weight: 500;
            font-size: 2.4rem;
            background: linear-gradient(135deg, #f0f9ff, #b8d4f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 20px rgba(0,40,80,0.2);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        /* 小屏适配 */
        @media (max-width: 640px) {
            .greeting-header .greeting-title {
                font-size: 1.8rem;
            }
            .greeting-header .greeting-icon {
                font-size: 2rem;
            }
        }

        @media (max-width: 430px) {
            .greeting-header .greeting-title {
                font-size: 1.5rem;
            }
            .greeting-header .greeting-icon {
                font-size: 1.6rem;
            }
        }

        /* ----- 融合搜索框 ----- */
        .search-fusion {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border-radius: 80px;
            padding: 8px 8px 8px 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                inset 0 2px 6px rgba(0,0,0,0.2),
                0 12px 32px -8px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .search-fusion:focus-within {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 
                inset 0 2px 8px rgba(0,0,0,0.15),
                0 18px 40px -10px rgba(0, 30, 60, 0.6);
        }

        /* ----- 引擎切换按钮组 (完全隐藏，保留DOM) ----- */
        .engine-tabs {
            display: none;
        }
        .engine-tab {
            display: none;
        }

        /* 搜索输入框 */
        .search-input-fusion {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 10px 14px 8px;
            font-size: 1.1rem;
            color: #f0f8ff;
            outline: none;
            min-width: 120px;
            letter-spacing: 0.3px;
        }

        .search-input-fusion::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
        }

        /* 搜索按钮 */
        .search-btn-fusion {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .search-btn-fusion:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .search-btn-fusion:active {
            transform: scale(0.96);
        }

        /* ----- 状态提示 (引擎信息 + 切换提示) ----- */
        .status-area {
            margin-top: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px 16px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            padding: 10px 22px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.25s;
            letter-spacing: 0.3px;
            display: inline-flex;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            cursor: default;
            user-select: none;
        }

        .status-area .engine-info {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-area .engine-info span {
            font-weight: 500;
            color: #b0d4ff;
            margin: 0 2px;
        }

        .status-divider {
            opacity: 0.2;
            user-select: none;
        }

        .status-area .hint-icon {
            opacity: 0.6;
        }

        /* 底部工作室信息 */
        .footer-studio {
            margin-top: 32px;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 20px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            transition: color 0.3s;
            font-weight: 300;
        }

        .footer-studio:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .glass-card {
                padding: 2rem 1.2rem 1.8rem;
                border-radius: 40px;
            }
            .search-fusion {
                padding: 6px 6px 6px 14px;
                border-radius: 60px;
                flex-wrap: wrap;
                background: rgba(255, 255, 255, 0.08);
            }
            .search-input-fusion {
                font-size: 1rem;
                padding: 12px 6px;
                min-width: 100px;
                flex: 1 1 140px;
            }
            .search-btn-fusion {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
            .status-area {
                font-size: 0.75rem;
                padding: 8px 16px;
                gap: 4px 10px;
            }
            .footer-studio {
                font-size: 0.7rem;
                padding-top: 16px;
                width: 90%;
                margin-top: 24px;
            }
        }

        @media (max-width: 430px) {
            .search-btn-fusion {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .search-input-fusion {
                font-size: 0.9rem;
                padding: 10px 4px;
            }
            .status-area {
                font-size: 0.7rem;
                padding: 6px 12px;
            }
        }

        @media (pointer: coarse) {
            body:active {
                transition: background-image 0.1s;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card" id="app">
        <!-- 标题区域：显示动态问候语 (替代“液态导航”) -->
        <div class="greeting-header" id="greetingHeader">
            <span class="greeting-icon" id="greetingHeaderIcon">🌅</span>
            <span class="greeting-title" id="greetingHeaderTitle">Good morning!</span>
        </div>

        <!-- 融合搜索框 -->
        <div class="search-fusion" id="searchFusion">
            <!-- 引擎切换按钮组 (完全隐藏) -->
            <div class="engine-tabs" id="engineTabs">
                <button class="engine-tab active" data-engine="baidu">百度</button>
                <button class="engine-tab" data-engine="sogou">搜狗</button>
                <button class="engine-tab" data-engine="bing-cn">必应CN</button>
                <button class="engine-tab" data-engine="google">Google</button>
                <button class="engine-tab" data-engine="bing">Bing</button>
                <button class="engine-tab" data-engine="duckduckgo">Duck</button>
            </div>

            <input type="text" class="search-input-fusion" id="searchInput" placeholder="输入关键词…" autofocus>

            <button class="search-btn-fusion" id="searchBtn">
                <span>🔍</span> 搜索
            </button>
        </div>

        <!-- 状态提示：引擎信息 + 切换方式 -->
        <div class="status-area" id="statusArea">
            <span class="engine-info">
                <span class="hint-icon">✦</span> 当前引擎：<span id="currentEngineLabel">百度</span>
            </span>
            <span class="status-divider">|</span>
            <span style="opacity:0.3; font-size:0.7rem;" id="toggleHint">(Tab切换)</span>
        </div>

        <div class="footer-studio">Finder studio 工作室制作</div>
    </div>

    <script>
        (function() {
            "use strict";

            // ----- 搜索引擎库 -----
            const ENGINES = {
                baidu: { name: '百度', url: 'https://www.baidu.com/s?wd=', group: 'domestic' },
                sogou: { name: '搜狗', url: 'https://www.sogou.com/web?query=', group: 'domestic' },
                'bing-cn': { name: '必应CN', url: 'https://cn.bing.com/search?q=', group: 'domestic' },
                google: { name: 'Google', url: 'https://www.google.com/search?q=', group: 'international' },
                bing: { name: 'Bing', url: 'https://www.bing.com/search?q=', group: 'international' },
                duckduckgo: { name: 'DuckDuckGo', url: 'https://duckduckgo.com/?q=', group: 'international' }
            };

            const ENGINE_KEYS = ['baidu', 'sogou', 'bing-cn', 'google', 'bing', 'duckduckgo'];

            // DOM
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const statusLabel = document.getElementById('currentEngineLabel');
            const statusArea = document.getElementById('statusArea');
            const toggleHint = document.getElementById('toggleHint');
            // 问候语DOM (标题区)
            const greetingHeaderIcon = document.getElementById('greetingHeaderIcon');
            const greetingHeaderTitle = document.getElementById('greetingHeaderTitle');
            const engineTabs = document.querySelectorAll('.engine-tab');

            let currentEngineKey = 'baidu';
            let currentIndex = 0;

            const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

            if (isMobile) {
                toggleHint.textContent = '(点击背景切换)';
            } else {
                toggleHint.textContent = '(Tab键切换)';
            }

            // ----- 获取时间问候语 (用于标题) -----
            function getGreeting() {
                const now = new Date();
                const hour = now.getHours();

                let emoji = '🌅';
                let text = 'Good morning!';

                if (hour >= 5 && hour < 12) {
                    emoji = '🌅';
                    text = 'Good morning!';
                } else if (hour >= 12 && hour < 14) {
                    emoji = '☀️';
                    text = 'Good noon!';
                } else if (hour >= 14 && hour < 18) {
                    emoji = '🌤️';
                    text = 'Good afternoon!';
                } else {
                    emoji = '🌙';
                    text = 'Good evening!';
                }

                return { emoji, text };
            }

            // 更新标题区的问候语
            function updateGreetingHeader() {
                const { emoji, text } = getGreeting();
                greetingHeaderIcon.textContent = emoji;
                greetingHeaderTitle.textContent = text;
            }

            // ----- 核心切换 -----
            function setActiveEngine(engineKey, fromUser = true) {
                if (!ENGINES[engineKey]) return;

                engineTabs.forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.engine === engineKey) {
                        tab.classList.add('active');
                    }
                });

                const engine = ENGINES[engineKey];
                statusLabel.textContent = engine.name;

                if (fromUser) {
                    statusArea.style.transition = 'all 0.15s';
                    statusArea.style.transform = 'scale(0.96)';
                    statusArea.style.opacity = '0.7';
                    setTimeout(() => {
                        statusArea.style.transform = 'scale(1)';
                        statusArea.style.opacity = '1';
                    }, 80);
                }

                currentEngineKey = engineKey;
                const idx = ENGINE_KEYS.indexOf(engineKey);
                if (idx !== -1) currentIndex = idx;
                searchInput.focus();
            }

            function switchToNextEngine() {
                const nextIndex = (currentIndex + 1) % ENGINE_KEYS.length;
                const nextKey = ENGINE_KEYS[nextIndex];
                setActiveEngine(nextKey, true);
            }

            function performSearch() {
                const query = searchInput.value.trim();
                if (!query) {
                    searchInput.style.transition = 'border 0.1s';
                    searchInput.style.border = '1px solid rgba(255,180,180,0.4)';
                    setTimeout(() => {
                        searchInput.style.border = 'none';
                    }, 300);
                    return;
                }

                const engine = ENGINES[currentEngineKey];
                if (!engine) return;
                const searchUrl = engine.url + encodeURIComponent(query);
                window.open(searchUrl, '_blank');
            }

            // ----- Bing 壁纸 (增强稳定版) -----
            function setBingWallpaper() {
                const sources = [
                    'https://bing.biturl.top/?resolution=1920&format=image&index=0&mkt=zh-CN',
                    'https://bing.img.run/1920x1080.php',
                    'https://api.dujin.org/bing/1920.php'
                ];

                let attempt = 0;
                const maxAttempts = sources.length;

                function tryLoad(index) {
                    if (index >= maxAttempts) {
                        document.body.style.backgroundImage = 'linear-gradient(145deg, #0f1f2f, #1a3450)';
                        document.body.style.backgroundColor = '#0f1f2f';
                        console.warn('所有Bing壁纸源加载失败，使用备用背景');
                        return;
                    }

                    const url = sources[index];
                    const img = new Image();
                    img.crossOrigin = 'anonymous';

                    img.onload = function() {
                        document.body.style.backgroundImage = `url(${url})`;
                        document.body.style.backgroundSize = 'cover';
                        document.body.style.backgroundPosition = 'center';
                        console.log('Bing壁纸加载成功 (源', index + 1, ')');
                    };

                    img.onerror = function() {
                        console.warn('Bing壁纸源', index + 1, '加载失败，尝试下一个...');
                        tryLoad(index + 1);
                    };

                    const timeoutId = setTimeout(() => {
                        img.src = '';
                        tryLoad(index + 1);
                    }, 8000);

                    img.src = url;
                    img.onload = function() {
                        clearTimeout(timeoutId);
                        document.body.style.backgroundImage = `url(${url})`;
                        document.body.style.backgroundSize = 'cover';
                        document.body.style.backgroundPosition = 'center';
                    };
                }

                tryLoad(0);
            }

            // ----- 事件绑定 -----
            function initEvents() {
                // Tab键切换 (电脑端)
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Tab' && !e.shiftKey && !e.ctrlKey && !e.altKey && !e.metaKey) {
                        e.preventDefault();
                        switchToNextEngine();
                        searchInput.focus();
                    }
                });

                // 移动端：点击背景切换
                document.body.addEventListener('click', function(e) {
                    if (!isMobile) return;
                    const card = document.querySelector('.glass-card');
                    if (card && card.contains(e.target)) {
                        const target = e.target;
                        if (target === card || 
                            (target.closest('.glass-card') && 
                             !target.closest('button') && 
                             !target.closest('input') && 
                             !target.closest('.status-area') &&
                             !target.closest('.greeting-header') &&
                             !target.closest('.footer-studio'))) {
                            switchToNextEngine();
                            e.stopPropagation();
                        }
                        return;
                    }
                    if (!e.target.closest('.glass-card')) {
                        switchToNextEngine();
                    }
                });

                // 搜索
                searchBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    performSearch();
                });

                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        performSearch();
                    }
                });

                // 点击状态条也可以切换
                statusArea.addEventListener('click', function(e) {
                    switchToNextEngine();
                });
            }

            // ----- 初始化 -----
            function initDefault() {
                engineTabs.forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.engine === 'baidu') {
                        tab.classList.add('active');
                    }
                });
                statusLabel.textContent = '百度';
                currentEngineKey = 'baidu';
                currentIndex = 0;
                // 更新标题问候语
                updateGreetingHeader();
            }

            function init() {
                setBingWallpaper();
                initEvents();
                initDefault();
                setTimeout(() => searchInput.focus(), 300);
            }

            if (document.readyState === 'complete') {
                init();
            } else {
                window.addEventListener('load', init);
            }

            window.__switchEngine = setActiveEngine;

        })();
    </script>

</body>
</html>
